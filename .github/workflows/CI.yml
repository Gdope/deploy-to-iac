name: Stefan-CI

on:
  workflow_dispatch:
  push:

jobs:
  Testing:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Code checkout
        uses: actions/checkout@v4

      - name: Maven test
        run: mvn test

      - name: Checkstyle
        run: mvn checkstyle:checkstyle

  sonarqube:
    name: SonarQube Workflow
    runs-on: ubuntu-latest
    needs: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup SonarQube
        uses: warchant/setup-sonar-scanner@v8

      - name: Update application.properties file
        run: |
          sed -i "s/db01/${{ secrets.RDS_ENDPOINT }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.username.*$/jdbc.username=${{ secrets.RDS_USER }}/" src/main/resources/application.properties
          sed -i "s/^jdbc.password.*$/jdbc.password=${{ secrets.RDS_PASS }}/" src/main/resources/application.properties
          sed -i "s/^memcached.active.host.*$/memcached.active.host=${{ secrets.MEMCACHED_DNS_NAME }}/" src/main/resources/application.properties
          sed -i "s/^rabbitmq.address.*$/rabbitmq.address=${{ secrets.RABBITMQ_DNS_NAME }}/" src/main/resources/application.properties

      - name: Build project
        run: mvn clean package -DskipTests

      - name: SonarQube Scan
        run: |
          sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.sources=src/ \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.junit.reportsPath=target/surefire-reports/ \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprofile
          path: target/*.war

  Deploy_and_publish:
    name: Deploy and publish
    runs-on: ubuntu-latest
    needs: sonarqube
    if: success()

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sprofile
          path: artifact

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Set artifact version
        run: |
          echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Upload WAR to S3
        run: |
          aws s3 cp artifact/*.war s3://${{ secrets.AWS_BUCKET_NAME }}/builds/${{ env.VERSION }}.war
          aws s3 cp artifact/*.war s3://${{ secrets.AWS_BUCKET_NAME }}/builds/latest.war

      - name: Deploy to private app instance through Bastion
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_PRIVATE_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ubuntu
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}

          script_stop: true
          script: |
            aws s3 cp s3://${{ secrets.AWS_BUCKET_NAME }}/builds/latest.war /tmp/vprofile-v2.war

            sudo systemctl stop tomcat
            sudo rm -rf /opt/tomcat/webapps/ROOT /opt/tomcat/webapps/ROOT.war
            sudo cp /tmp/vprofile-v2.war /opt/tomcat/webapps/ROOT.war
            sudo systemctl start tomcat
